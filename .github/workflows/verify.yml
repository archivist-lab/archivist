name: Verify

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify
      - run: pnpm --dir apps/player exec playwright install --with-deps chromium
      - run: pnpm --filter archivist-player test:e2e
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: player-playwright-report
          path: apps/player/playwright-report
          retention-days: 7
