---
id: eztv
name: EZTV
description: "EZTV is a Public torrent site for TV shows"
language: en-US
type: public
encoding: UTF-8
links:
  - https://eztvx.to/
  - https://eztv.wf/
  - https://eztv.tf/
  - https://eztv.yt/
  - https://eztv1.xyz/
legacylinks:
  - https://eztv.ag/ # redirects to .re
  - https://eztv.it/ # redirects to .re
  - https://eztv.ch/ # redirects to .re
  - https://eztv.io/
  - https://eztv.re/
  - https://eztv.li/
  - https://eztv.mrunblock.bond/
  - https://eztv.nocensor.cloud/
  - https://eztv.unblockninja.com/ # layout=def_wlinks not working
  - https://eztv.ninjaproxy1.com/ # layout=def_wlinks not working
  - https://eztv.proxyninja.org/ # layout=def_wlinks not working
  - https://eztv.abcproxy.org/
  - https://eztv.unblockit.download/

caps:
  categorymappings:
    - {id: 1, cat: TV, desc: "TV"}
  categories:
    1: TV

  modes:
    search: [q]
    tv-search: [q, season, ep]

settings: []

search:
  paths:
    - path: "api/get-torrents?limit={{ if .Query.Limit }}{{ .Query.Limit }}{{ else }}100{{ end }}"
      response:
        type: json

  keywordsfilters:
    - name: re_replace
      args: ["\\bS\\d{2,3}\\b", ""] # remove season tag without episode (search doesn't support it)
    - name: trim
    # fixes for site search issues - Prowlarr #1094
    - name: replace
      args: ["-", ""]
    - name: replace
      args: [" ", "-"]
    - name: replace
      args: ["&", ""]

  rows:
    selector: torrents
    filters:
      - name: andmatch

  fields:
    category:
      text: 1
    title:
      selector: title
      filters:
        - name: replace
          args: ["[eztv]", ""]
        - name: replace
          args: [" EZTV", ""]
        - name: re_replace
          args: ["\\(.*\\)$", ""]
        - name: trim
    details:
      selector: magnet_url
    download:
      selector: magnet_url
    magneturl:
      selector: magnet_url
    infohash:
      selector: hash
    size:
      selector: size_bytes
      optional: true
      default: 0
    date:
      selector: date_released_unix
    seeders:
      selector: seeds
    leechers:
      selector: peers
    downloadvolumefactor:
      text: 0
    uploadvolumefactor:
      text: 1
# engine n/a
