# Published-image deployment. Copy this file to docker-compose.yml beside .env.
# The base stack publishes only Archivist (2424) and Player (4242).
services:
  archivist:
    image: ghcr.io/archivist-lab/archivist:latest
    container_name: archivist
    ports:
      - "2424:2424"
    env_file:
      - .env
    environment:
      TZ: ${TZ:-UTC}
      ARCHIVIST_LOUDNESS_CONCURRENCY: ${ARCHIVIST_LOUDNESS_CONCURRENCY:-2}
      ARCHIVIST_TRANSCODE_CONCURRENCY: ${ARCHIVIST_TRANSCODE_CONCURRENCY:-2}
      PLAYER_ORIGINS: ${PLAYER_ORIGINS:-http://localhost:4242,http://127.0.0.1:4242}
      # Transmission-style download flow: torrents land in …/incomplete while
      # downloading and are moved to …/complete on finish, then imported into media.
      TORRENT_INCOMPLETE_DIR: ${TORRENT_INCOMPLETE_DIR:-/app/downloads/incomplete}
      TORRENT_DOWNLOAD_DIR: ${TORRENT_DOWNLOAD_DIR:-/app/downloads/complete}
    volumes:
      - ./data:/app/data
      - ./media:/app/media
      - ./downloads:/app/downloads
    restart: unless-stopped

  archivist-player:
    image: ghcr.io/archivist-lab/archivist-player:latest
    container_name: archivist-player
    ports:
      - "4242:4242"
    environment:
      PORT: 4242
      ARCHIVIST_UPSTREAM: http://archivist:2424
      ARCHIVIST_SERVICE_TOKEN: ${ARCHIVIST_API_TOKEN:-}
    depends_on:
      archivist:
        condition: service_healthy
    restart: unless-stopped
