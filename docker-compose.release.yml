# Published-image deployment. Copy this file to docker-compose.yml beside .env.
# One image serves both ports: 2424 = admin UI + full API, 4242 = player UI.
services:
  archivist:
    image: ghcr.io/archivist-lab/archivist:latest
    container_name: archivist
    # 2424 = admin UI + full API; 4242 = player UI (delegates only
    # /api/v1/player + /media in-process; the admin API is not exposed on 4242).
    ports:
      - "2424:2424"
      - "4242:4242"
    env_file:
      - .env
    environment:
      TZ: ${TZ:-UTC}
      ARCHIVIST_LOUDNESS_CONCURRENCY: ${ARCHIVIST_LOUDNESS_CONCURRENCY:-2}
      ARCHIVIST_TRANSCODE_CONCURRENCY: ${ARCHIVIST_TRANSCODE_CONCURRENCY:-2}
      PLAYER_ORIGINS: ${PLAYER_ORIGINS:-http://localhost:4242,http://127.0.0.1:4242}
      # Transmission-style download flow: torrents land in …/incomplete while
      # downloading and are moved to …/complete on finish, then imported into media.
      TORRENT_INCOMPLETE_DIR: ${TORRENT_INCOMPLETE_DIR:-/app/downloads/incomplete}
      TORRENT_DOWNLOAD_DIR: ${TORRENT_DOWNLOAD_DIR:-/app/downloads/complete}
    volumes:
      - ./data:/app/data
      - ./media:/app/media
      - ./downloads:/app/downloads
    # Hardware video transcoding (Intel QSV/VAAPI, AMD VAAPI): pass the GPU render
    # node and point ARCHIVIST_FFMPEG_PATH at a HW-enabled ffmpeg (the bundled one
    # is software-only). NVIDIA instead needs the nvidia container runtime.
    # devices:
    #   - /dev/dri:/dev/dri
    # environment:
    #   ARCHIVIST_FFMPEG_PATH: /usr/bin/ffmpeg
    restart: unless-stopped
