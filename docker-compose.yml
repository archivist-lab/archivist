services:
  archivist:
    build:
      context: .
      dockerfile: Dockerfile
    image: archivist:1
    container_name: archivist
    # Single process serves both: 2424 = admin UI + full API, 4242 = player UI
    # (delegates only /api/v1/player + /media in-process; admin API is off 4242).
    ports:
      - "2424:2424"
      - "4242:4242"
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Dubai}
      ARCHIVIST_LOUDNESS_CONCURRENCY: ${ARCHIVIST_LOUDNESS_CONCURRENCY:-2}
      ARCHIVIST_TRANSCODE_CONCURRENCY: ${ARCHIVIST_TRANSCODE_CONCURRENCY:-2}
      PLAYER_ORIGINS: ${PLAYER_ORIGINS:-http://localhost:4242,http://127.0.0.1:4242}
      PLAYER_UI_V2_ENABLED: ${PLAYER_UI_V2_ENABLED:-true}
      PLAYER_UI_DEFAULT_PRESET: ${PLAYER_UI_DEFAULT_PRESET:-categories}
      PLAYER_UI_MAX_WIDGET_ITEMS: ${PLAYER_UI_MAX_WIDGET_ITEMS:-36}
      PLAYER_UI_TELEMETRY_ENABLED: ${PLAYER_UI_TELEMETRY_ENABLED:-false}
      # Transmission-style download flow: torrents land in …/incomplete while
      # downloading and are moved to …/complete on finish, then imported into media.
      TORRENT_INCOMPLETE_DIR: ${TORRENT_INCOMPLETE_DIR:-/app/downloads/incomplete}
      TORRENT_DOWNLOAD_DIR: ${TORRENT_DOWNLOAD_DIR:-/app/downloads/complete}
    volumes:
      - ./data:/app/data
      - ./media:/app/media
      - ./downloads:/app/downloads
    # Hardware video transcoding (Intel QSV/VAAPI, AMD VAAPI): pass the GPU render
    # node AND point the optimiser at a HW-enabled ffmpeg (the bundled ffmpeg is
    # software-only). Uncomment and set ARCHIVIST_FFMPEG_PATH to a system ffmpeg
    # built with VAAPI/QSV (e.g. install `ffmpeg` + `intel-media-va-driver` in a
    # custom image). NVIDIA instead needs the nvidia container runtime.
    # devices:
    #   - /dev/dri:/dev/dri
    # environment:
    #   ARCHIVIST_FFMPEG_PATH: /usr/bin/ffmpeg
    restart: unless-stopped
